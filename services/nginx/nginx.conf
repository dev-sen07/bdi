worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # El servicio LLM puede tardar bastante en responder (generación con GPU),
    # así que ampliamos los timeouts de proxy para no cortar las peticiones.
    proxy_connect_timeout   60s;
    proxy_send_timeout      600s;
    proxy_read_timeout      600s;

    # Permite cuerpos grandes en la ingesta de documentos.
    client_max_body_size    50m;

    upstream frontend {
        server frontend:3000;
    }

    upstream api_gateway {
        server api-gateway:8000;
    }

    server {
        listen 80;
        server_name _;

        # Rutas de la API -> api-gateway (FastAPI).
        # Se mantiene el path tal cual (el frontend las llama en same-origin).
        location ~ ^/(query|ingest|stats|nodes|models|health)(/|$) {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Streaming/respuestas largas sin buffering intermedio.
            proxy_buffering off;
        }

        # Todo lo demás -> frontend (Next.js), incluyendo /_next, assets y HMR.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Soporte para WebSocket (HMR de Next.js en desarrollo).
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
